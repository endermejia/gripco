<div class="animate-fade min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-[440px] p-8 md:p-[48px] rounded-2xl bg-white/90 backdrop-blur-[10px] border border-[rgba(28,76,138,0.1)] shadow-lg">
    <h2 class="text-3xl md:text-4xl font-black text-secondary mb-8 text-center mt-0">
      {{ isLogin() ? i18n.t()['auth.login'] : i18n.t()['auth.register'] }}
    </h2>
    
    <form (submit)="handleSubmit()" class="space-y-6">
      @if (!isLogin()) {
        <div class="flex flex-col mb-5">
          <label class="block font-medium text-slate-700 mb-2 ml-1 text-[0.9rem]">{{ i18n.t()['auth.name'] }}</label>
          <input type="text" [ngModel]="fullName()" (ngModelChange)="fullName.set($event)" 
                 name="fullName" required placeholder="Tu nombre" autocomplete="name" 
                 class="w-full py-[14px] px-4 border-2 border-black/5 rounded-xl text-[1.05rem] font-inherit bg-slate-50 transition-all duration-300 focus:outline-none focus:border-primary focus:bg-white focus:shadow-[0_0_0_4px_rgba(207,19,129,0.1)]">
        </div>
      }

      <div class="flex flex-col mb-5">
        <label class="block font-medium text-slate-700 mb-2 ml-1 text-[0.9rem]">{{ i18n.t()['auth.email'] }}</label>
        <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" 
               name="email" required placeholder="tu@email.com" autocomplete="email" 
               class="w-full py-[14px] px-4 border-2 border-black/5 rounded-xl text-[1.05rem] font-inherit bg-slate-50 transition-all duration-300 focus:outline-none focus:border-primary focus:bg-white focus:shadow-[0_0_0_4px_rgba(207,19,129,0.1)]">
      </div>

      <div class="flex flex-col mb-5">
        <label class="block font-medium text-slate-700 mb-2 ml-1 text-[0.9rem]">{{ i18n.t()['auth.password'] }}</label>
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" 
               name="password" required placeholder="******" [attr.autocomplete]="isLogin() ? 'current-password' : 'new-password'" 
               class="w-full py-[14px] px-4 border-2 border-black/5 rounded-xl text-[1.05rem] font-inherit bg-slate-50 transition-all duration-300 focus:outline-none focus:border-primary focus:bg-white focus:shadow-[0_0_0_4px_rgba(207,19,129,0.1)]">
      </div>

      @if (error()) {
        <div class="bg-[#fff0f0] text-[#ff4d4d] p-2.5 rounded-lg text-[0.9rem] mb-5 font-bold border border-red-100 animate-fade">
          {{ error() }}
        </div>
      }

      <button type="submit" class="btn btn-primary w-full py-5 text-xl mt-4 rounded-2xl hover:scale-105" [disabled]="loading()">
        @if (loading()) {
          <lucide-icon [name]="Loader2" size="24" class="animate-spin"></lucide-icon>
        }
        {{ loading() ? i18n.t()['common.loading'] : (isLogin() ? i18n.t()['auth.login'] : i18n.t()['auth.register']) }}
      </button>
    </form>

    <div class="mt-[20px] text-center text-[0.9rem]">
      <p class="text-slate-500 font-medium">
        {{ isLogin() ? i18n.t()['auth.no_account'] : i18n.t()['auth.has_account'] }}
        <button (click)="toggleMode()" class="text-primary font-bold hover:underline ml-1 cursor-pointer">
          {{ isLogin() ? i18n.t()['auth.go_to_register'] : i18n.t()['auth.go_to_login'] }}
        </button>
      </p>
    </div>
  </div>
</div>
