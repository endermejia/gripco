<div class="auth-container animate-fade min-h-[60vh] flex items-center justify-center px-4 py-12">
  <div class="auth-card glass card w-full max-w-[480px] p-8 md:p-12">
    <h2 class="text-3xl md:text-4xl font-black text-secondary mb-8 text-center">
      {{ isLogin() ? i18n.t()['auth.login'] : i18n.t()['auth.register'] }}
    </h2>
    
    <form (submit)="handleSubmit()" class="space-y-6">
      @if (!isLogin()) {
        <div class="form-group flex flex-col">
          <label class="font-bold text-slate-700 mb-2 ml-1">{{ i18n.t()['auth.name'] }}</label>
          <input type="text" [ngModel]="fullName()" (ngModelChange)="fullName.set($event)" 
                 name="fullName" required placeholder="Tu nombre" autocomplete="name" class="select-modern p-4 text-base">
        </div>
      }

      <div class="form-group flex flex-col">
        <label class="font-bold text-slate-700 mb-2 ml-1">{{ i18n.t()['auth.email'] }}</label>
        <input type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" 
               name="email" required placeholder="tu@email.com" autocomplete="email" class="select-modern p-4 text-base">
      </div>

      <div class="form-group flex flex-col">
        <label class="font-bold text-slate-700 mb-2 ml-1">{{ i18n.t()['auth.password'] }}</label>
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" 
               name="password" required placeholder="******" [attr.autocomplete]="isLogin() ? 'current-password' : 'new-password'" class="select-modern p-4 text-base">
      </div>

      @if (error()) {
        <div class="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-bold border border-red-100 animate-fade">
          {{ error() }}
        </div>
      }

      <button type="submit" class="btn btn-primary w-full py-5 text-xl mt-4 shadow-xl shadow-primary/25 disabled:opacity-50 transition-all font-black" [disabled]="loading()">
        {{ loading() ? i18n.t()['common.loading'] : (isLogin() ? i18n.t()['auth.login'] : i18n.t()['auth.register']) }}
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-slate-500 font-medium">
        {{ isLogin() ? i18n.t()['auth.no_account'] : i18n.t()['auth.has_account'] }}
        <button (click)="toggleMode()" class="text-primary font-black hover:underline ml-1">
          {{ isLogin() ? i18n.t()['auth.go_to_register'] : i18n.t()['auth.go_to_login'] }}
        </button>
      </p>
    </div>
  </div>
</div>
